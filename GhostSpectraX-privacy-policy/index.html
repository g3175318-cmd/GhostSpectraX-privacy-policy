<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostSpectraX</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:#fff;
  background: radial-gradient(circle at 20% 0%, #0a0a0a, #000);
  overflow-x:hidden;
}

/* Parallax background */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, rgba(0,255,255,0.05), transparent 60%);
  z-index:-1;
}

header{
  text-align:center;
  padding:70px 20px;
}
.logo{
  font-size:48px;
  color:#00e6ff;
  text-shadow:0 0 25px #00e6ff,0 0 50px #8a2be2;
}
.tagline{
  color:#aaa;
  margin-top:10px;
}

.section{
  padding:70px 20px;
  text-align:center;
}

/* Carousel */
.carousel{
  position:relative;
  max-width:1100px;
  margin:auto;
  overflow:hidden;
}
.track{
  display:flex;
  gap:30px;
  animation:scroll 18s linear infinite;
}
@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.phone{
  min-width:260px;
  height:520px;
  border-radius:30px;
  overflow:hidden;
  background:#111;
  position:relative;
  backdrop-filter: blur(10px);
  box-shadow:0 0 20px rgba(0,255,255,0.2);
  transition:0.5s;
}

.phone:hover{
  transform:scale(1.08) rotateY(10deg);
  box-shadow:0 0 40px rgba(0,255,255,0.6);
}

.phone img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* reflection */
.phone::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.2), transparent 60%);
  opacity:0;
  transition:0.5s;
}
.phone:hover::after{
  opacity:1;
}

/* Feature cards */
.features{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:40px;
}
.card{
  background:rgba(20,20,20,0.6);
  border-radius:15px;
  padding:20px;
  backdrop-filter: blur(12px);
  box-shadow:0 0 20px rgba(0,255,255,0.1);
}
.card h3{color:#00e6ff}

button{
  margin-top:40px;
  background:linear-gradient(90deg,#00e6ff,#8a2be2);
  border:none;
  padding:15px 35px;
  border-radius:30px;
  font-weight:bold;
  color:#000;
  box-shadow:0 0 20px #00e6ff;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
}

footer{
  text-align:center;
  padding:30px;
  color:#666;
}
</style></head><body>
<div class="bg"></div><header>
  <div class="logo">👻 GhostSpectraX</div>
  <div class="tagline">Visualize the unseen • Offline 2D & 3D Graphing</div>
</header><section class="section">
  <h2>Live App Experience</h2>
  <p>Scroll through real app screens with futuristic motion</p>  <div class="carousel">
    <div class="track">
      <div class="phone"><img src="screenshot1.jpg"></div>
      <div class="phone"><img src="screenshot2.jpg"></div>
      <div class="phone"><img src="screenshot3.jpg"></div>
      <div class="phone"><img src="screenshot4.jpg"></div><!-- duplicate for seamless loop -->
  <div class="phone"><img src="screenshot1.jpg"></div>
  <div class="phone"><img src="screenshot2.jpg"></div>
  <div class="phone"><img src="screenshot3.jpg"></div>
  <div class="phone"><img src="screenshot4.jpg"></div>
</div>

  </div>
</section><section class="section">
  <h2>Why GhostSpectraX?</h2>
  <div class="features">
    <div class="card"><h3>⚡ Offline</h3><p>No internet required</p></div>
    <div class="card"><h3>📈 2D</h3><p>Smooth plotting</p></div>
    <div class="card"><h3>🌌 3D</h3><p>Rotate & explore</p></div>
    <div class="card"><h3>🚀 Fast</h3><p>High performance</p></div>
  </div>
  <button>Download Coming Soon</button>
</section><footer>
  © 2026 GhostSpectraX
</footer></body>
</html>
